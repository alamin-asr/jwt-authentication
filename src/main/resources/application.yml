
security:
  jwt:
    token:
      secret-key: ${JWT_SECRET}

server:
  port: 8080
  error:
    include-stacktrace: never
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:5432/mydb?currentSchema=public
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:alamin}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true